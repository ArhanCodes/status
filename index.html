<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status — arhan.dev</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 14px; }
    .banner { padding: 16px 20px; border-radius: 10px; font-weight: 600; font-size: 15px; margin-bottom: 32px; transition: all 0.3s; }
    .banner-loading { background: rgba(255, 255, 255, 0.05); color: #888; border: 1px solid rgba(255, 255, 255, 0.1); }
    .banner-up { background: rgba(30, 185, 105, 0.12); color: #1EB969; border: 1px solid rgba(30, 185, 105, 0.25); }
    .banner-down { background: rgba(255, 75, 75, 0.12); color: #FF4B4B; border: 1px solid rgba(255, 75, 75, 0.25); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 16px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #666; border-bottom: 1px solid #1a1a1a; }
    td { padding: 14px 16px; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
    .site-cell { font-weight: 500; }
    .site-cell a { color: #e0e0e0; text-decoration: none; }
    .site-cell a:hover { color: #1EB969; }
    tr.up td:nth-child(2) { color: #1EB969; }
    tr.up td:nth-child(3) { color: #888; }
    tr.down td:nth-child(2) { color: #FF4B4B; }
    tr.down td:nth-child(3) { color: #555; }
    tr.checking td:nth-child(2) { color: #888; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #333; border-top-color: #888; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { margin-top: 40px; text-align: center; color: #444; font-size: 13px; }
    .footer a { color: #1EB969; text-decoration: none; }
    .refresh-btn { background: none; border: 1px solid #333; color: #888; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-top: 16px; transition: all 0.2s; }
    .refresh-btn:hover { border-color: #1EB969; color: #1EB969; }
    .last-check { margin-top: 12px; color: #444; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Status</h1>
    <p class="subtitle">Real-time monitoring for arhan.dev services</p>
    <div id="banner" class="banner banner-loading">Checking all services...</div>
    <table>
      <thead><tr><th>Service</th><th>Status</th><th>Response</th></tr></thead>
      <tbody id="results"></tbody>
    </table>
    <div class="footer">
      <p>Powered by <a href="https://quill.tradebuddy.dev">Quill</a></p>
      <button class="refresh-btn" onclick="checkAll()">Refresh</button>
      <p id="lastCheck" class="last-check"></p>
    </div>
  </div>

  <script>
    const sites = [
      { name: "arhan.dev", url: "https://arhan.dev" },
      { name: "quill.tradebuddy.dev", url: "https://quill.tradebuddy.dev" },
      { name: "rewovenapp.com", url: "https://rewovenapp.com" },
      { name: "mytradebuddy.com", url: "https://mytradebuddy.com" },
      { name: "tradebuddy.dev", url: "https://tradebuddy.dev" },
      { name: "deepika.fit", url: "https://deepika.fit" }
    ];

    const tbody = document.getElementById("results");
    const banner = document.getElementById("banner");
    const lastCheck = document.getElementById("lastCheck");

    function renderLoading() {
      tbody.innerHTML = sites.map(s =>
        `<tr class="checking"><td class="site-cell">⚪ <a href="${s.url}" target="_blank">${s.name}</a></td><td><span class="spinner"></span></td><td>—</td></tr>`
      ).join("");
    }

    async function checkSite(site) {
      try {
        const start = Date.now();
        const res = await fetch(site.url, { method: "HEAD", mode: "no-cors", signal: AbortSignal.timeout(8000) });
        const time = Date.now() - start;
        // no-cors returns opaque response (status 0), but if fetch didn't throw, site is reachable
        return { ...site, up: true, time, status: res.status || "OK" };
      } catch (e) {
        return { ...site, up: false, time: 0, status: "Down" };
      }
    }

    async function checkAll() {
      renderLoading();
      banner.className = "banner banner-loading";
      banner.textContent = "Checking all services...";

      const results = await Promise.all(sites.map(checkSite));
      const totalUp = results.filter(r => r.up).length;

      tbody.innerHTML = results.map(r => {
        const dot = r.up ? "🟢" : "🔴";
        const statusText = r.up ? (r.status === 0 ? "OK" : r.status) : "Down";
        const timeText = r.up ? `${r.time}ms` : "—";
        const cls = r.up ? "up" : "down";
        return `<tr class="${cls}"><td class="site-cell">${dot} <a href="${r.url}" target="_blank">${r.name}</a></td><td>${statusText}</td><td>${timeText}</td></tr>`;
      }).join("");

      if (totalUp === results.length) {
        banner.className = "banner banner-up";
        banner.textContent = "All systems operational";
      } else {
        banner.className = "banner banner-down";
        banner.textContent = `${totalUp}/${results.length} systems operational`;
      }

      lastCheck.textContent = `Last checked: ${new Date().toLocaleTimeString()}`;
    }

    checkAll();
    // Auto-refresh every 60 seconds
    setInterval(checkAll, 60000);
  </script>
</body>
</html>
